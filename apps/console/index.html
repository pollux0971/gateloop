<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>GateLoop · Cockpit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --canvas:#0E1620; --panel:#141E2A; --panel-2:#18242F; --raise:#1D2B38;
  --ink:#E6EDF3; --dim:rgba(230,237,243,.56); --faint:rgba(230,237,243,.34); --hair:rgba(230,237,243,.10);
  --signal:#5BD6C0; --signal-deep:#2E8C7C;
  --r-planning:#8AB4F8; --r-supervisor:#C792EA; --r-developer:#5BD6C0; --r-debugger:#F2A65A;
  --r-harness:#9FB0BF; --r-validator:#7EE081; --r-gateway:#E0C36B; --r-human:#E6EDF3;
  --sans:"Inter",system-ui,sans-serif; --mono:"JetBrains Mono",ui-monospace,monospace;
  --ok:#7EE081; --warn:#F2A65A;
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--canvas);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased}
a{color:var(--signal);text-decoration:none}
.mono{font-family:var(--mono)}
/* top bar */
header{position:sticky;top:0;z-index:5;background:linear-gradient(180deg,#101924,#0E1620);border-bottom:1px solid var(--hair);padding:14px 22px}
.brandrow{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
.brand{font-weight:700;letter-spacing:-.02em;font-size:18px}
.brand b{color:var(--signal)}
.tagline{color:var(--faint);font-size:12.5px}
.counts{margin-left:auto;display:flex;gap:18px}
.counts .c{font-family:var(--mono);font-size:12px;color:var(--dim)}
.counts .c b{color:var(--ink);font-weight:600}
/* lifecycle rail (signature) */
.rail{display:flex;align-items:center;gap:0;margin-top:13px;overflow-x:auto;padding-bottom:4px}
.rail .st{font-family:var(--mono);font-size:10.5px;color:var(--faint);white-space:nowrap;padding:3px 9px;border:1px solid var(--hair);border-radius:999px;background:var(--panel)}
.rail .st.live{color:#06231e;background:var(--signal);border-color:var(--signal);font-weight:600;box-shadow:0 0 0 4px rgba(91,214,192,.13)}
.rail .arrow{color:var(--faint);font-size:11px;padding:0 5px;flex:0 0 auto}
.rail .gate{border-style:dashed;border-color:var(--r-gateway);color:var(--r-gateway)}
/* layout */
main{display:grid;grid-template-columns:340px 1fr 360px;gap:0;min-height:calc(100vh - 118px)}
.col{padding:18px 18px 60px;border-right:1px solid var(--hair);overflow:auto}
.col:last-child{border-right:none}
.eyebrow{font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin:2px 0 12px;display:flex;align-items:center;gap:8px}
.eyebrow .n{color:var(--signal)}
h3.group{font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--dim);margin:18px 0 8px;display:flex;align-items:center;gap:8px}
h3.group::before{content:"";width:7px;height:7px;border-radius:2px;background:var(--role,var(--dim))}
/* skill card */
.skill{background:var(--panel);border:1px solid var(--hair);border-left:2px solid var(--role,var(--hair));border-radius:9px;padding:10px 12px;margin-bottom:8px}
.skill .id{font-family:var(--mono);font-size:12px;color:var(--ink);font-weight:500;word-break:break-all}
.skill .desc{font-size:12px;color:var(--dim);line-height:1.5;margin-top:5px}
.skill .meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.chip{font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:6px;border:1px solid var(--hair);color:var(--dim)}
.chip.status-needs_tests{color:var(--warn);border-color:rgba(242,166,90,.4)}
.chip.status-registered{color:var(--ok);border-color:rgba(126,224,129,.4)}
.chip.status-draft{color:var(--faint)}
.chip.dep::before{content:"⇠ ";color:var(--faint)}
/* agent card */
.agent{background:var(--panel-2);border:1px solid var(--hair);border-radius:9px;padding:11px 12px;margin-bottom:8px}
.agent .top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.agent .name{font-family:var(--mono);font-weight:600;font-size:12.5px;color:var(--role,var(--ink))}
.agent .bd{font-family:var(--mono);font-size:10px;color:var(--faint)}
.agent .row{font-size:11.5px;margin-top:6px;line-height:1.5}
.agent .row .k{color:var(--faint)}
.agent .can{color:var(--dim)} .agent .cant{color:var(--r-debugger)}
/* conversation */
.runhead{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.runhead .rid{font-family:var(--mono);font-size:13px}
.badge-sample{font-family:var(--mono);font-size:10px;color:var(--warn);border:1px dashed rgba(242,166,90,.5);border-radius:6px;padding:2px 7px}
.msg{position:relative;padding:0 0 16px 22px;border-left:1px solid var(--hair);margin-left:6px}
.msg::before{content:"";position:absolute;left:-5px;top:3px;width:9px;height:9px;border-radius:50%;background:var(--role,var(--r-harness));box-shadow:0 0 0 3px var(--canvas)}
.msg:last-child{border-left-color:transparent}
.msg .head{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.msg .from{font-family:var(--mono);font-size:11.5px;font-weight:600;color:var(--role,var(--r-harness))}
.msg .arr{color:var(--faint);font-size:11px}
.msg .to{font-family:var(--mono);font-size:11px;color:var(--dim)}
.msg .type{margin-left:auto;font-family:var(--mono);font-size:9.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);border:1px solid var(--hair);border-radius:5px;padding:1px 6px}
.msg .body{font-size:12.5px;color:var(--ink);line-height:1.55;margin-top:5px}
.msg .refs{margin-top:5px;display:flex;gap:6px;flex-wrap:wrap}
.msg .seq{font-family:var(--mono);font-size:10px;color:var(--faint)}
/* package + escalation + plugin */
.pkg{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11.5px;padding:6px 0;border-bottom:1px solid var(--hair)}
.pkg .nm{color:var(--dim);flex:1;word-break:break-all}
.dot{width:7px;height:7px;border-radius:50%}
.dot.tested{background:var(--ok)} .dot.untested{background:var(--faint)}
.pkg .stub{color:var(--warn);font-size:10px}
.esc{background:var(--panel);border:1px solid rgba(242,166,90,.28);border-radius:9px;padding:11px 12px;margin-bottom:9px}
.esc .t{font-family:var(--mono);font-size:11px;color:var(--warn);font-weight:600}
.esc .by{font-family:var(--mono);font-size:10px;color:var(--faint);float:right}
.esc .reason{font-size:12px;color:var(--dim);line-height:1.5;margin:6px 0}
.esc .ask{font-size:12px;color:var(--ink);line-height:1.5}
.esc .opt{font-size:11.5px;color:var(--dim);margin-top:6px;padding-left:10px;border-left:2px solid var(--hair)}
.esc .opt b{color:var(--ink);font-family:var(--mono);font-weight:500}
.plugin{background:linear-gradient(180deg,var(--panel),var(--panel-2));border:1px solid var(--hair);border-radius:9px;padding:11px 12px}
.plugin .nm{font-weight:600;font-size:13px}
.plugin .ext{font-family:var(--mono);font-size:9.5px;color:var(--r-supervisor);border:1px solid rgba(199,146,234,.4);border-radius:5px;padding:1px 6px;margin-left:6px}
.plugin .desc{font-size:11.5px;color:var(--dim);line-height:1.5;margin:6px 0}
.plugin code{font-family:var(--mono);font-size:11px;background:var(--canvas);border:1px solid var(--hair);border-radius:5px;padding:2px 6px;color:var(--signal)}
.src{font-family:var(--mono);font-size:10.5px;color:var(--faint);margin-top:12px;text-align:right}
.src b{color:var(--dim)}
@media(max-width:980px){ main{grid-template-columns:1fr} .col{border-right:none;border-bottom:1px solid var(--hair)} }
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<header>
  <div class="brandrow">
    <div class="brand">Code<b>Harness</b> · Cockpit</div>
    <div class="tagline">deterministic multi-agent code-development harness — live platform & run view</div>
    <div class="counts" id="counts"></div>
  </div>
  <div class="rail" id="rail" title="product runtime lifecycle"></div>
</header>
<main>
  <section class="col" id="leftcol">
    <div class="eyebrow"><span class="n">A</span> Skills &amp; Agents</div>
    <div id="agents"></div>
    <div id="skills"></div>
  </section>
  <section class="col" id="centercol">
    <div class="eyebrow"><span class="n">B</span> Conversation — agent dialogue</div>
    <div id="conversation"></div>
  </section>
  <section class="col" id="rightcol">
    <div class="eyebrow"><span class="n">C</span> Platform</div>
    <div id="platform"></div>
  </section>
</main>
<script>
const ROLE = {planning_steward:'--r-planning',supervisor:'--r-supervisor',developer:'--r-developer',debugger:'--r-debugger',shared:'--r-harness',harness:'--r-harness',validator:'--r-validator',permission_gateway:'--r-gateway',human:'--r-human'};
const SNAP = {"platform": {"name": "GateLoop", "agents": 4, "packages": 20, "skills": 19, "states": 13}, "skills": [{"skill_id": "planning-steward.idea-to-epic", "agent_role": "planning_steward", "status": "needs_tests", "description": "Turn a classified idea into a machine-checkable epic/story graph: testable objectives, declared exit criteria, acyclic depends_on DAG, valid parallelism classes.", "depends_on": [], "enhances": ["planning-steward.epic-story-sharding", "supervisor.story-contract"]}, {"skill_id": "supervisor.story-contract", "agent_role": "supervisor", "status": "needs_tests", "description": "Assemble an enforceable StoryContract from the spec bundle; passes validateStoryContract (non-empty write-set, machine-checkable acceptance, guards, rollback, attempt_budget, parallelism, depends_on).", "depends_on": ["planning-steward.program-spec-assembly"], "enhances": []}, {"skill_id": "developer.patch-proposal", "agent_role": "developer", "status": "needs_tests", "description": "Produce a minimal additive reversible Patch Proposal from a decomposed Task Packet: GRASP change_type, changed_files within write-set, rollback + test_plan + summary.", "depends_on": ["shared.task-decomposition"], "enhances": []}, {"skill_id": "debugger.failure-triage", "agent_role": "debugger", "status": "needs_tests", "description": "Classify a failure, build a pipe-delimited signature, hypothesize root cause, pick a GRASP repair operator within scope, and emit a failure gene whose avoid line is <=40 words. Never edits the story goal.", "depends_on": ["shared.task-decomposition"], "enhances": []}, {"skill_id": "shared.example-skill", "agent_role": "shared", "status": "draft", "description": "One-line statement of what this skill does and when to use it.", "depends_on": [], "enhances": []}, {"skill_id": "planning-steward.prd-authoring", "agent_role": "planning_steward", "status": "draft", "description": "Author the PRD (vision, JTBD, user journeys, glossary, FR/NFR, success metrics).", "depends_on": [], "enhances": []}, {"skill_id": "planning-steward.architecture-design", "agent_role": "planning_steward", "status": "draft", "description": "Produce architecture decisions that make agent implementation consistent; runs after PRD, before epics.", "depends_on": [], "enhances": []}, {"skill_id": "planning-steward.epic-story-sharding", "agent_role": "planning_steward", "status": "draft", "description": "Shard PRD+architecture into epics and hyper-detailed stories with full acceptance criteria and source paths.", "depends_on": [], "enhances": []}, {"skill_id": "planning-steward.machine-checkable-acceptance", "agent_role": "planning_steward", "status": "needs_tests", "description": "Author acceptance criteria as machine-checkable files_must_exist / behaviors_must_pass / commands_must_pass; behavior ids equal the vitest it() names. Reject prose.", "depends_on": [], "enhances": ["planning-steward.epic-story-sharding", "supervisor.story-contract"]}, {"skill_id": "planning-steward.behavior-test-derivation", "agent_role": "planning_steward", "status": "needs_tests", "description": "Derive named behaviors (happy/negative/boundary/security/stub_lock) and the matching vitest it() skeleton from an objective, before implementation. Test-first; preserves acceptance-test integrity.", "depends_on": ["planning-steward.machine-checkable-acceptance"], "enhances": ["developer.patch-proposal"]}, {"skill_id": "planning-steward.acceptance-test-scaffold", "agent_role": "planning_steward", "status": "needs_tests", "description": "Emit a runnable vitest *.test.ts skeleton from behaviors_must_pass: one it() per behavior id, imports the unit, stub-lock behaviors assert toThrow(/not implemented/). Non-implementer authored.", "depends_on": ["planning-steward.behavior-test-derivation", "planning-steward.machine-checkable-acceptance"], "enhances": ["developer.patch-proposal"]}, {"skill_id": "planning-steward.interface-contract-spec", "agent_role": "planning_steward", "status": "needs_tests", "description": "Specify components as typed TypeScript signatures + per-function behavior contracts (pre/post/throws/effects), with injected oracles for trust decisions. No prose-only, no any, no self-reported trust flags.", "depends_on": [], "enhances": ["planning-steward.architecture-design"]}, {"skill_id": "planning-steward.write-set-and-guards", "agent_role": "planning_steward", "status": "needs_tests", "description": "Derive a minimal, glob-valid, parallel-disjoint allowed_write_set plus forbidden_actions containing the mandatory no-secret/no-sudo/no-real-api guards.", "depends_on": [], "enhances": ["supervisor.story-contract", "planning-steward.program-spec-assembly"]}, {"skill_id": "planning-steward.documented-stub-registry", "agent_role": "planning_steward", "status": "needs_tests", "description": "Produce a documented stub (typed signature + throw 'not implemented: symbol') and its stub_registry.json entry mapping symbol+file to an owning story/roadmap. Enforce no unowned/orphan stubs.", "depends_on": ["planning-steward.interface-contract-spec"], "enhances": []}, {"skill_id": "planning-steward.program-spec-assembly", "agent_role": "planning_steward", "status": "needs_tests", "description": "Assemble the six spec-skill outputs into one machine-facing bundle and verify cross-artifact consistency (behavior-id set equality across acceptance/test/contract, stubs registered, guards present, acceptance-test integrity).", "depends_on": ["planning-steward.behavior-test-derivation", "planning-steward.machine-checkable-acceptance", "planning-steward.acceptance-test-scaffold", "planning-steward.interface-contract-spec", "planning-steward.write-set-and-guards", "planning-steward.documented-stub-registry"], "enhances": ["supervisor.story-contract"]}, {"skill_id": "shared.task-decomposition", "agent_role": "shared", "status": "needs_tests", "description": "Break a Task Packet into small, ordered, independently-verifiable subtasks within the contract write-set, via the task-graph tools. Smaller steps raise per-step success; never widen scope.", "depends_on": [], "enhances": ["developer.patch-proposal", "debugger.failure-triage"]}, {"skill_id": "developer.spec-conformance", "agent_role": "developer", "status": "needs_tests", "description": "HARD gate before submitting a proposal: schema-valid, changed_files within write-set, machine-checkable acceptance, rollback present. Fail → fix or escalate, never submit malformed.", "depends_on": [], "enhances": ["developer.patch-proposal"]}, {"skill_id": "developer.pre-flight-check", "agent_role": "developer", "status": "needs_tests", "description": "Advisory self-check in a disposable workspace (typecheck + affected tests) with bounded self-correction; repeated signature or exhausted budget => escalate. Never the verdict.", "depends_on": [], "enhances": ["developer.patch-proposal", "developer.spec-conformance"]}, {"skill_id": "shared.structured-escalation", "agent_role": "shared", "status": "needs_tests", "description": "Emit a structured Escalation (type/reason/evidence/requested_decision/options) when blocked or uncertain, instead of guessing. Prevents self-widening scope, deleting tests, hallucinating context.", "depends_on": [], "enhances": ["developer.patch-proposal", "debugger.failure-triage"]}], "agents": [{"id": "planning_steward", "boundary": "Human↔System", "does": "idea → PRD → architecture → epics/stories", "never": "write code · dispatch agents"}, {"id": "supervisor", "boundary": "System↔Agents", "does": "decide next state · compose task packets · track state", "never": "edit code · run shell · apply/merge/promote · read secrets"}, {"id": "developer", "boundary": "—", "does": "minimal additive reversible patch · decompose · pre-flight · spec-conformance", "never": "apply/merge/promote · widen scope · self-complete"}, {"id": "debugger", "boundary": "—", "does": "triage · minimal repair · emit failure gene", "never": "change story goal · delete tests · promote"}], "packages": [{"name": "@gateloop/agent-output", "stubs": 0, "tested": true}, {"name": "@gateloop/codegraph-adapter", "stubs": 1, "tested": false}, {"name": "@gateloop/codex-auth", "stubs": 5, "tested": false}, {"name": "@gateloop/context-manager", "stubs": 4, "tested": true}, {"name": "@gateloop/debugger-runtime", "stubs": 0, "tested": true}, {"name": "@gateloop/developer-runtime", "stubs": 1, "tested": true}, {"name": "@gateloop/event-log", "stubs": 0, "tested": true}, {"name": "@gateloop/failure-bank", "stubs": 3, "tested": false}, {"name": "@gateloop/harness-core", "stubs": 2, "tested": false}, {"name": "@gateloop/model-gateway", "stubs": 7, "tested": false}, {"name": "@gateloop/permission-gateway", "stubs": 0, "tested": true}, {"name": "@gateloop/planning-steward", "stubs": 2, "tested": true}, {"name": "@gateloop/preflight-runner", "stubs": 1, "tested": true}, {"name": "@gateloop/shared", "stubs": 0, "tested": false}, {"name": "@gateloop/skill-runtime", "stubs": 0, "tested": true}, {"name": "@gateloop/skill-tester", "stubs": 4, "tested": false}, {"name": "@gateloop/supervisor-runtime", "stubs": 3, "tested": true}, {"name": "@gateloop/task-graph", "stubs": 0, "tested": true}, {"name": "@gateloop/validator-suite", "stubs": 1, "tested": true}, {"name": "@gateloop/workspace-manager", "stubs": 4, "tested": true}], "state_machine": ["IDEA_INBOX", "PLANNING_BUNDLE", "SUPERVISOR_CONTRACT", "DEVELOPER_PATCH_PROPOSAL", "DEVELOPER_PREFLIGHT", "SPEC_CONFORMANCE_REVIEW", "WORKSPACE_APPLY", "VALIDATION", "DEBUG_LOOP", "CHECKPOINT", "HUMAN_GATE", "PROMOTION_REVIEW", "DONE"], "conversation": {"run_id": "run_sample_001", "story_id": "STORY-003.1", "sample": true, "messages": [{"seq": 0, "from": "human", "to": "planning_steward", "type": "idea", "summary": "Implement the Permission Gateway MVP.", "timestamp": "2026-06-09T09:00:00Z"}, {"seq": 1, "from": "planning_steward", "to": "supervisor", "type": "story_contract", "summary": "STORY-003.1 contract issued: write-set packages/permission-gateway/src/**, 22 machine-checkable behaviors.", "artifact_refs": ["story_contract#STORY-003.1"], "timestamp": "2026-06-09T09:01:10Z"}, {"seq": 2, "from": "supervisor", "to": "developer", "type": "task_packet", "summary": "Developer Task Packet: implement allow/ask/deny pipeline; decompose first.", "artifact_refs": ["task_packet#1"], "timestamp": "2026-06-09T09:01:40Z"}, {"seq": 3, "from": "developer", "to": "harness", "type": "patch_proposal", "summary": "Proposal: ADD evaluateToolRequest pipeline (changed_files: permission-gateway/src/index.ts).", "artifact_refs": ["patch_proposal#1"], "timestamp": "2026-06-09T09:06:20Z"}, {"seq": 4, "from": "developer", "to": "harness", "type": "preflight_report", "summary": "Pre-flight: typecheck ok, affected tests 20/22; self-corrected once → 22/22. verdict: submit.", "artifact_refs": ["preflight#1"], "timestamp": "2026-06-09T09:08:05Z"}, {"seq": 5, "from": "harness", "to": "developer", "type": "spec_conformance", "summary": "Spec-conformance gate PASS: schema valid, changed_files ⊆ write-set, acceptance machine-checkable, rollback present.", "timestamp": "2026-06-09T09:08:20Z"}, {"seq": 6, "from": "permission_gateway", "to": "harness", "type": "permission_decision", "summary": "allow: write inside disposable workspace (registry-confirmed).", "timestamp": "2026-06-09T09:08:25Z"}, {"seq": 7, "from": "validator", "to": "supervisor", "type": "validation_report", "summary": "PASS: pnpm test permission-gateway → 22/22 behaviors green.", "artifact_refs": ["validation_report#1"], "timestamp": "2026-06-09T09:09:40Z"}, {"seq": 8, "from": "supervisor", "to": "harness", "type": "checkpoint", "summary": "Checkpoint drafted; awaiting human merge (apply ≠ promotion).", "timestamp": "2026-06-09T09:09:55Z"}, {"seq": 9, "from": "harness", "to": "human", "type": "human_gate", "summary": "Human gate: review + merge STORY-003.1.", "timestamp": "2026-06-09T09:10:00Z"}]}, "escalations": [{"type": "needs_scope_expansion", "raised_by": "developer", "story_id": "STORY-003.2", "reason": "applyPatch needs to touch workspace-manager/src/git.ts which is outside the contract write-set.", "evidence_refs": ["codegraph#applyPatch"], "requested_decision": "Approve a contract revision adding workspace-manager/src/git.ts to the write-set?", "options": [{"option_id": "widen", "tradeoff": "adds one file to scope; keeps the story whole"}, {"option_id": "split", "tradeoff": "new story for git ops; smaller blast radius, more handoff"}]}, {"type": "needs_clarification", "raised_by": "developer", "story_id": "STORY-004.1", "reason": "Objective does not say whether the Supervisor context excludes the full Developer trace.", "evidence_refs": ["contract#STORY-004.1"], "requested_decision": "Should buildRoleContextPacket exclude raw developer trace for the supervisor role?", "options": [{"option_id": "exclude", "tradeoff": "smaller context, safer; matches memory model"}, {"option_id": "include_summary", "tradeoff": "more context, higher token cost"}]}], "plugins": [{"id": "huashu-design", "name": "Huashu Design · 花叔Design", "kind": "design", "external": true, "source": "skills.sh", "license": "MIT", "install": "npx skills add alchaincyf/huashu-design", "description": "HTML-native hi-fi design plugin — prototypes, slides, motion, infographics. External; not in the agent skill graph."}]};
const API = 'http://127.0.0.1:8787';
const esc = s => String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

async function load(){
  // prefer the live API; fall back to the embedded snapshot so this renders anywhere
  let d = SNAP, live=false;
  try{
    const ping = await fetch(API+'/api/platform',{signal:AbortSignal.timeout(900)});
    if(ping.ok){
      const [pl,sk,ag,pk,sm,pg,co,es] = await Promise.all([
        ping.json(), fetch(API+'/api/skills').then(r=>r.json()), fetch(API+'/api/agents').then(r=>r.json()),
        fetch(API+'/api/packages').then(r=>r.json()), fetch(API+'/api/state-machine').then(r=>r.json()),
        fetch(API+'/api/plugins').then(r=>r.json()),
        fetch(API+'/api/conversations/'+SNAP.conversation.run_id).then(r=>r.json()),
        fetch(API+'/api/escalations').then(r=>r.json())]);
      d = {platform:pl, skills:sk.skills, agents:ag.agents, packages:pk.packages, state_machine:sm.states, plugins:pg.plugins, conversation:co, escalations:es.escalations};
      live=true;
    }
  }catch(e){/* offline → embedded snapshot */}
  render(d, live);
}

function render(d, live){
  // counts + source
  document.getElementById('counts').innerHTML =
    [['agents',d.platform.agents],['packages',d.platform.packages],['skills',d.platform.skills],['states',d.platform.states]]
    .map(([k,v])=>`<span class="c"><b>${v}</b> ${k}</span>`).join('');
  // lifecycle rail
  const live_state = d.conversation && d.conversation.messages ? 'HUMAN_GATE' : null;
  document.getElementById('rail').innerHTML = d.state_machine.map((s,i)=>{
    const gate = (s==='SPEC_CONFORMANCE_REVIEW'||s==='HUMAN_GATE'||s==='PROMOTION_REVIEW');
    const cls = 'st'+(s===live_state?' live':'')+(gate?' gate':'');
    return `<span class="${cls}">${s}</span>`+(i<d.state_machine.length-1?'<span class="arrow">›</span>':'');
  }).join('');
  // agents
  document.getElementById('agents').innerHTML = '<h3 class="group" style="--role:var(--signal)">Agents — trust boundaries</h3>'+
    d.agents.map(a=>`<div class="agent" style="--role:var(${ROLE[a.id]||'--r-harness'})">
      <div class="top"><span class="name">${esc(a.id)}</span><span class="bd">${esc(a.boundary)}</span></div>
      <div class="row"><span class="k can">can</span> ${esc(a.does)}</div>
      <div class="row"><span class="k">never</span> <span class="cant">${esc(a.never)}</span></div></div>`).join('');
  // skills grouped by role
  const byRole = {};
  d.skills.forEach(s=>{(byRole[s.agent_role]=byRole[s.agent_role]||[]).push(s);});
  const order=['planning_steward','supervisor','developer','debugger','shared'];
  let sk='';
  order.filter(r=>byRole[r]).forEach(r=>{
    sk += `<h3 class="group" style="--role:var(${ROLE[r]||'--r-harness'})">${r} · ${byRole[r].length}</h3>`;
    byRole[r].forEach(s=>{
      const deps=(s.depends_on||[]).map(x=>`<span class="chip dep">${esc(x.split('.').pop())}</span>`).join('');
      sk += `<div class="skill" style="--role:var(${ROLE[r]||'--r-harness'})">
        <div class="id">${esc(s.skill_id)}</div>
        ${s.description?`<div class="desc">${esc(s.description)}</div>`:''}
        <div class="meta"><span class="chip status-${esc(s.status)}">${esc(s.status||'—')}</span>${deps}</div></div>`;
    });
  });
  document.getElementById('skills').innerHTML = sk;
  // conversation
  const c=d.conversation;
  let html = `<div class="runhead"><span class="rid">${esc(c.run_id)}</span>`+
    (c.story_id?`<span class="chip">${esc(c.story_id)}</span>`:'')+
    (c.sample?`<span class="badge-sample">sample run</span>`:'')+`</div>`;
  html += c.messages.map(m=>{
    const rv=ROLE[m.from]||'--r-harness';
    const refs=(m.artifact_refs||[]).map(r=>`<span class="chip">${esc(r)}</span>`).join('');
    return `<div class="msg" style="--role:var(${rv})">
      <div class="head"><span class="seq">#${m.seq}</span><span class="from">${esc(m.from)}</span>
        ${m.to?`<span class="arr">→</span><span class="to">${esc(m.to)}</span>`:''}
        <span class="type">${esc(m.type)}</span></div>
      <div class="body">${esc(m.summary)}</div>${refs?`<div class="refs">${refs}</div>`:''}</div>`;
  }).join('');
  document.getElementById('conversation').innerHTML = html;
  // platform: packages + escalations + plugins
  let pf = '<h3 class="group">Packages — impl &amp; tests</h3>';
  pf += d.packages.map(p=>`<div class="pkg"><span class="dot ${p.tested?'tested':'untested'}"></span>
     <span class="nm">${esc(p.name)}</span>${p.stubs?`<span class="stub">${p.stubs} stub${p.stubs>1?'s':''}</span>`:'<span class="stub" style="color:var(--ok)">●</span>'}</div>`).join('');
  pf += '<h3 class="group" style="--role:var(--warn)">Escalations — agent asked, not guessed</h3>';
  pf += (d.escalations||[]).map(e=>`<div class="esc"><span class="by">${esc(e.raised_by||'')}</span><span class="t">${esc(e.type)}</span>
     <div class="reason">${esc(e.reason)}</div><div class="ask">${esc(e.requested_decision)}</div>
     ${(e.options||[]).map(o=>`<div class="opt"><b>${esc(o.option_id)}</b> — ${esc(o.tradeoff)}</div>`).join('')}</div>`).join('') || '<div class="desc" style="color:var(--faint);font-size:12px">none open</div>';
  pf += '<h3 class="group" style="--role:var(--r-supervisor)">External plugins</h3>';
  pf += (d.plugins||[]).map(p=>`<div class="plugin"><span class="nm">${esc(p.name)}</span><span class="ext">external · ${esc(p.source||'')}</span>
     <div class="desc">${esc(p.description)}</div>${p.install?`<code>${esc(p.install)}</code>`:''}</div>`).join('');
  pf += `<div class="src">data source: <b>${live?'live API · :8787':'embedded snapshot'}</b></div>`;
  document.getElementById('platform').innerHTML = pf;
}
load();
</script>
</body>
</html>
