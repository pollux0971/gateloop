# Context Manager operational parameters.
# Grounds the MUSE / ReCAP / AgentSwing / LightMem paper findings in concrete numbers.
# The context-manager package reads these at runtime (see packages/context-manager).
version: 1

# ── Two-level adaptive compression (MUSE-Autoskill) ──────────────────────────
# Level 1: compress a single large node (e.g. one massive tool output).
# Level 2: chain-compress when the total window still exceeds the chain threshold.
# Rule: run Level-1 first; only escalate to Level-2 if still over budget.
compression:
  level1:
    node_token_threshold: 4000       # compress a single node when it exceeds this
    strategy: summarize_node
  level2:
    chain_token_threshold: 60000     # chain-compress when total context exceeds this
    strategy: summarize_chain
  pinning:
    keep_first_turns: 3              # verbatim — task framing, contract, env snapshot
    keep_last_turns: 5               # verbatim — current working context
  compression_rate_floor: 0.3       # never compress below 30% of original
                                     # (LightMem: over-compression hurts accuracy)

# ── Sliding window (ReCAP) ───────────────────────────────────────────────────
sliding_window:
  max_turns: 20                      # hard cap; oldest non-pinned turns are dropped first

# ── Periodic re-injection (ReCAP anti rule-amnesia) ──────────────────────────
reinject:
  story_contract_every_n_calls: 10   # re-inject the active story contract every N LLM calls
  failure_genes_every_n_calls: 10    # re-inject relevant AVOID warnings every N calls
  hard_rules_every_n_calls: 20       # re-inject CLAUDE.md invariants (write-set, forbidden, gates)

# ── State-dependent strategy routing (AgentSwing) ────────────────────────────
# At each compaction trigger, pick a strategy based on trajectory state.
strategy_routing:
  search_phase:        keep_last_n       # still exploring → preserve recent turns
  terminal_phase:      summarize_chain   # converging on answer → compress middle
  stuck:               aggressive_discard  # same error ≥ N times → discard and reground

# ── Memory tiers (LightMem) ──────────────────────────────────────────────────
# Expensive trace/memory consolidation happens offline between stories, not
# during the story run (where only the lightweight online cache is used).
memory:
  online_cache_max_turns: 30
  offline_consolidation_trigger: story_boundary   # consolidate when a story ends
  offline_consolidation_async: true               # do not block the next story's start

# ── Per-agent token budgets ───────────────────────────────────────────────────
# Developer gets the largest budget: story_contract + relevant files +
# failure genes + patch history all need to fit.
budgets:
  planning_steward:  32000
  supervisor:        16000
  developer:        128000
  debugger:          32000

# ── Assessment-role context isolation (STORY-030.4) ───────────────────────────
# Assessment agents are isolated from the GENERATOR'S REASONING, not just its
# output — the anti-anchoring invariant generalised from the Reviewer. Enforced as
# grant-lists in context-manager (tested invariants), documented here.
role_context_profiles:
  # The Assessor judges outcomes, not intentions: GRANT intent + result, DENY process.
  assessor:
    grants: [requirement_intent, delivered_result, delivered_tests]
    denies: [implementation_history, develop_history, agent_reasoning, developer_reasoning, debugger_reasoning, rejected_approach_rationale]
  # Each Debugger pass is FRESH (STORY-030.5): GRANT failure + acceptance + diff (+ gene
  # signals), DENY the Developer's reasoning AND prior debug passes' reasoning.
  debugger_fresh:
    grants: [failing_output, acceptance_criteria, diff_under_review, matching_failure_genes]
    denies: [developer_reasoning, agent_reasoning, implementation_history, develop_history, prior_debug_reasoning, debug_attempts_reasoning, rejected_approach_rationale]
  # Between stories (STORY-031.2): only the inbound handoff card (facts) crosses;
  # the previous story's reasoning/transcript/debug-narrative is DENIED at the boundary.
  cross_story:
    grants: [handoff_card]
    denies: [prior_story_reasoning, prior_developer_reasoning, prior_debugger_reasoning, prior_debug_narrative, prior_transcript, prior_agent_reasoning, prior_rationale, developer_reasoning, debugger_reasoning, debug_narrative, transcript, implementation_history, agent_reasoning, rejected_approach_rationale]

# ── Pinned (never-compress) zone (STORY-027.4 + 031.4) ────────────────────────
# These never compact, regardless of run length. 031.4 extends 027.4 with the
# inbound handoff card (the next story must not lose its factual entry point) and
# the acceptance intent (030.1 — the correctness bar must survive). A compaction
# that would drop a pinned section excludes it and records the exclusion in the
# trace; every compacted (non-pinned) section keeps its trace_ref so it stays
# resolvable (compaction is pointer-safe and reversible).
pinned_zone:
  never_compress: [arch_decisions, story_invariants, global_gate_statuses, inbound_handoff_card, acceptance_intent]
