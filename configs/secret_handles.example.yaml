# Example only. Do not put real secrets here. The harness resolves a handle to a
# short-lived credential at call time via the Secret Broker; the raw value never
# enters any agent's context, logs, or traces.
handles:
  # ---- DEFAULT: Codex via ChatGPT subscription (OAuth, not an API key) ----
  provider.codex.oauth:
    provider: codex
    purpose: llm_provider
    auth_kind: oauth
    token_store: ~/.codex/auth.json        # access + refresh + id token; managed by the broker
    auto_refresh: true                      # refresh when expiring within ~5 min
    relogin_on_expiry: true                 # interactive browser re-login when the refresh token dies
    approval: human_login                   # the browser sign-in IS the human gate
    terms: "Personal developer use only. Shared ChatGPT rate limits. Not for resale/multi-user."

  # ---- Third-party / metered API keys ----
  provider.deepseek.default:
    provider: deepseek
    purpose: llm_provider
    auth_kind: api_key
    approval: first_enable_only
  provider.openai_compatible.default:
    provider: openai_compatible
    purpose: llm_provider
    auth_kind: api_key
    approval: first_enable_only
  provider.openai.default:
    provider: openai
    purpose: llm_provider
    auth_kind: api_key
    approval: first_enable_only
  provider.anthropic.default:
    provider: anthropic
    purpose: llm_provider
    auth_kind: api_key
    approval: first_enable_only

  # ---- Tool / external-service credentials (agent tool use stays gated) ----
  github.readonly.token:
    provider: github
    purpose: readonly_repo_access
    approval: required
