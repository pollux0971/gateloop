permission_modes:
- plan
- ask
- accept_edits
- bypass_workspace
- deny_unlisted
protected_paths:
- .git
- .env
- .env.*
- secrets/
- ~/.ssh
- ~/.config
- node_modules/
- dist/
- reserved_patches/
- ~/.codex
- ~/.codex/auth.json
secret_patterns:
- OPENAI_API_KEY
- ANTHROPIC_API_KEY
- GITHUB_TOKEN
- DEEPSEEK_API_KEY
- CODEX_AUTH_JSON
- CODEX_ACCESS_TOKEN
hard_deny_commands:
- rm -rf /
- mkfs
- dd if=
- shutdown
- reboot
ask_commands:
- sudo
- curl
- wget
- chmod 777
real_api_calls:
  enabled: false # CLOSED 2026-06-17 by pollux after GateLoop stage-2
  kill_switch: false
  ci_override: true   # when CI env var is set, gateway ignores enabled:true

# STORY-021.3: quality_bar.required_checks now derived from settings.quality_bar.greenfield.
quality_bar:
  required_checks: [build, test, typecheck]   # default; overridden by settings
  coverage_threshold: null

competitive_debug:
  enabled: false # CLOSED 2026-06-17 by pollux after GateLoop stage-2
  max_k: 4            # hard cap on k per story; costs multiply
  # To enable for a story: set story.competitive_debug=true and story.debug_k=2 in tracker
